services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: gradebook
      POSTGRES_PASSWORD: gradebook
      POSTGRES_DB: gradebook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradebook"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://gradebook:gradebook@db:5432/gradebook
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: